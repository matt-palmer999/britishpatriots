<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<link rel="icon" type="image/png" href="/assets/images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--red:#CC0000;--navy:#0d1f3c;--gold:#B8860B;--gold-light:#D4A843;--black:#0a0a0a;--off-white:#F5F2ED;--border:#D0C8BE;--text:#1a1a1a;--mid-grey:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--off-white);color:var(--text);font-size:15px;line-height:1.5;}




/* TOP BAR */
.top-bar{background:#080f1e;color:#666;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:5px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a2a4a;}
.top-bar a{color:#666;text-decoration:none;margin:0 8px;}
.top-bar a:hover{color:#B8860B;}




/* MASTHEAD */
.masthead{background:var(--navy);border-bottom:3px solid var(--gold-light);overflow:hidden;width:100%;}
.masthead-img{width:100%;height:auto;max-height:180px;object-fit:cover;object-position:center top;display:block;}
@media(max-width:768px){.masthead-img{max-height:110px;object-position:left center;}}




/* NAV */
nav{background:#080f1e;border-bottom:3px solid var(--gold-light);}
nav ul{max-width:1200px;margin:0 auto;padding:0 20px;list-style:none;display:flex;overflow-x:auto;}
nav ul li a{display:block;padding:10px 14px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888;text-decoration:none;white-space:nowrap;transition:color .15s,background .15s;}
nav ul li a:hover{color:var(--gold-light);background:#0d1f3c;}
nav ul li.active a{color:var(--gold-light);}
